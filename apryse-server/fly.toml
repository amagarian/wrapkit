app = "wrapkit-apryse"
primary_region = "lax"

[build]

[env]
  PORT = "8080"
  APRYSE_MODULE_PATH = "/app/apryse-modules"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "10s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
